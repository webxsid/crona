name: Release

on:
  push:
    branches:
      - main
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build, for example v1.2.0"
        required: true
      prerelease:
        description: "Publish the GitHub release as a prerelease"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            shared/go.sum
            kernel/go.sum
            tui/go.sum

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          prerelease=true
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            prerelease="${{ inputs.prerelease }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            version="v$(awk '/^PROJECT_VERSION := / { print $3 }' Makefile)"
          elif [[ "${GITHUB_REF_NAME}" == release/* ]]; then
            version="${GITHUB_REF_NAME#release/}"
          else
            echo "Unsupported release ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-\.][A-Za-z0-9]+)*$ ]]; then
            echo "Invalid release version: ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Check metadata
        run: make release-check

      - name: Build artifacts
        run: make release VERSION="${{ steps.version.outputs.version }}"

      - name: Prepare release notes
        run: |
          mkdir -p release-notes
          sh ./scripts/release_notes.sh "${{ steps.version.outputs.version }}" > release-notes/body.md

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crona-${{ steps.version.outputs.version }}
          path: release/${{ steps.version.outputs.version }}/*
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body_path: release-notes/body.md
          files: release/${{ steps.version.outputs.version }}/*
