name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            shared/go.sum
            kernel/go.sum
            tui/go.sum
            cli/go.sum

      - name: Run tests
        run: make test-unit

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          install-only: true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINGET_PKGS_GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_GITHUB_TOKEN }}
          WINGET_PKGS_REPO_OWNER: webxsid
          WINGET_PKGS_REPO_NAME: winget-pkgs
        run: goreleaser release --clean

      - name: Normalize GitHub release state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_NOTES_FILE="$(mktemp)"
          trap 'rm -f "${RELEASE_NOTES_FILE}"' EXIT
          sh ./scripts/release_notes.sh "${GITHUB_REF_NAME}" > "${RELEASE_NOTES_FILE}"
          gh release edit "${GITHUB_REF_NAME}" --notes-file "${RELEASE_NOTES_FILE}"
          if printf '%s' "${GITHUB_REF_NAME}" | grep -Eq -- '-beta'; then
            gh release edit "${GITHUB_REF_NAME}" --prerelease --latest=false
          else
            gh release edit "${GITHUB_REF_NAME}" --latest
          fi

      - name: Publish Homebrew formula
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: sh ./scripts/publish_homebrew_formula.sh "${GITHUB_REF_NAME}" "release/${GITHUB_REF_NAME}"
