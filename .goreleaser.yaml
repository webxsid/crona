version: 2

project_name: crona

builds:
  - id: crona
    main: ./cli/cmd/crona
    binary: crona
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X crona/shared/version.Version={{.Version}}
  - id: crona-daemon
    main: ./kernel/cmd/crona-kernel
    binary: crona-daemon
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X crona/shared/version.Version={{.Version}}
  - id: crona-tui
    main: ./tui
    binary: crona-tui
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X crona/shared/version.Version={{.Version}}

archives:
  - id: crona-bundle
    ids:
      - crona
      - crona-daemon
      - crona-tui
    formats:
      - zip
    wrap_in_directory: false
    name_template: >-
      crona-bundle-{{ .Version }}-{{ .Os }}-{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  abbrev: -1

release:
  github:
    owner: webxsid
    name: crona
  draft: false
  prerelease: auto
  extra_files:
    - glob: release/{{ .Tag }}/install-crona-tui.sh
    - glob: release/{{ .Tag }}/install-crona-tui.ps1
    - glob: release/{{ .Tag }}/crona-assets-{{ .Tag }}.tar.gz

before:
  hooks:
    - sh -c 'CRONA_RELEASE_ASSETS_ONLY=1 sh ./scripts/build_release.sh {{ .Tag }}'

winget:
  - name: crona
    package_identifier: Webxsid.Crona
    package_name: Crona
    publisher: Webxsid
    short_description: local-first work tracker for developers
    description: local-first work tracker for developers
    homepage: https://crona.work
    license: MIT
    ids:
      - crona-bundle
    repository:
      owner: "webxsid"
      name: "winget-pkgs"
      token: "{{ .Env.WINGET_PKGS_GITHUB_TOKEN }}"
      branch: "crona-{{ .Tag }}"
      pull_request:
        enabled: false
    skip_upload: '{{ if or (contains .Tag "-beta") (eq .Env.WINGET_PKGS_GITHUB_TOKEN "") }}true{{ else }}false{{ end }}'
